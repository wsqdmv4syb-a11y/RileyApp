<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Ghost | Steel Anchor Terminal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-grey: #262629;
            --sidebar-width: 300px;
            --glass: rgba(20, 20, 20, 0.7);
        }

        body { 
            background: #000;
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0; display: flex; height: 100vh; width: 100vw;
            overflow: hidden;
            /* 适配 iOS 全屏模式 */
            padding-top: env(safe-area-inset-top);
        }

        /* 移动端菜单按钮 */
        #menu-toggle {
            display: none;
            position: fixed;
            top: calc(10px + env(safe-area-inset-top));
            left: 15px;
            z-index: 1001;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
        }

        /* 侧边栏基础样式 */
        #sidebar {
            width: var(--sidebar-width);
            background: #111;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            width: 100%;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 120px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; /* iOS 丝滑滚动 */
        }

        /* 底部输入框适配 */
        .input-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            /* 关键：适配 iPhone 底部安全区域 */
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            backdrop-filter: blur(10px);
        }

        .input-box {
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            display: flex;
            padding: 5px 18px;
            align-items: center;
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 0;
            outline: none;
            font-size: 16px; /* 设为16px防止 iOS 自动放大页面 */
        }

        /* ================= 移动端适配逻辑 (iOS/iPadOS) ================= */
        
        /* 手机端 (iPhone) */
        @media (max-width: 768px) {
            #menu-toggle { display: block; } /* 显示菜单按钮 */
            
            #sidebar {
                position: fixed;
                left: 0; top: 0; bottom: 0;
                transform: translateX(-100%); /* 默认藏在左边 */
                box-shadow: 20px 0 50px rgba(0,0,0,0.5);
            }

            #sidebar.open {
                transform: translateX(0); /* 点击后滑出 */
            }

            /* 遮罩层：点击侧边栏外关闭 */
            #sidebar-overlay {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            #sidebar-overlay.active { display: block; }

            .msg-wrap { max-width: 85%; }
            .transfer-card { width: 90vw; max-width: 320px; }
        }

        /* 平板端 (iPad) */
        @media (min-width: 769px) and (max-width: 1024px) {
            :root { --sidebar-width: 260px; }
            #sidebar { display: flex; transform: none; }
            #menu-toggle { display: none; }
        }

        /* 通用滚动条美化 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        /* ================= 新增: 日历与天气 UI ================= */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; font-size: 16px;}
        .calendar-header button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-day-name { text-align: center; font-size: 11px; color: #aaa; margin-bottom: 5px; }
        .cal-day { background: rgba(255,255,255,0.05); border-radius: 6px; padding: 5px; min-height: 45px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; }
        .cal-day:hover { background: rgba(255,255,255,0.15); }
        .cal-day.today { border: 1px solid var(--ios-blue); }
        .cal-date { font-size: 12px; font-weight: bold; margin-bottom: 2px; }
        .cal-event { font-size: 10px; color: var(--love-pink-dark); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cal-holiday { font-size: 10px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cal-mark { width: 6px; height: 6px; border-radius: 50%; background: rgba(0, 122, 255, 0.75); margin-top: 6px; }
        .cal-check { font-size: 12px; color: #34c759; margin-top: auto; line-height: 1; }
        .cal-events-wrap { margin-top: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 12px; }
        .cal-events-title { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .cal-events-list { display: flex; flex-direction: column; gap: 8px; }
        .cal-events-item { display: flex; justify-content: space-between; gap: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 10px 12px; }
        .cal-events-item b { font-size: 13px; }
        .cal-events-item span { font-size: 12px; color: #888; }

        .weather-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05);}
        .weather-card h3 { margin: 0 0 10px 0; font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .time-display { font-size: 36px; font-weight: bold; margin-bottom: 5px; font-family: "SF Pro Display", sans-serif; }
        .weather-desc { font-size: 15px; color: white; }

        /* ================= 聊天主区域 ================= */
        .chat-area { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
        .chat-header { padding: 15px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; background: rgba(10,10,10,0.5); backdrop-filter: blur(20px); z-index: 5; }
        .avatar { width: 40px; height: 40px; background: #1a1a1a; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 22px; border: 1px solid rgba(255,255,255,0.1); }
        .header-info b { font-size: 16px; display: block; }
        .header-info span { font-size: 11px; color: #888; }
        .header-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
        .love-space-btn { font-size: 24px; cursor: pointer; transition: transform 0.2s; padding: 5px; }
        .love-space-btn:hover { transform: scale(1.1); }
        .shop-btn { font-size: 22px; cursor: pointer; transition: transform 0.2s; padding: 6px; }
        .shop-btn:hover { transform: scale(1.1); }
        #chat-window { flex: 1; padding: 40px 15% 20px 15%; overflow-y: auto; display: flex; flex-direction: column; scroll-behavior: smooth; }
        .msg-wrap { margin-bottom: 18px; display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-wrap.user { align-items: flex-end; }
        .msg-wrap.bot { align-items: flex-start; }
        .bubble { max-width: 65%; padding: 12px 18px; font-size: 15px; line-height: 1.5; position: relative; word-wrap: break-word; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .user .bubble { background: var(--ios-blue); border-radius: 18px 18px 2px 18px; color: white; }
        .bot .bubble { background: var(--ios-grey); border-radius: 18px 18px 18px 2px; color: white; }
        .status { font-size: 11px; color: #888; margin-top: 6px; padding: 0 5px; } /* 时间戳样式 */

        /* ================= Transfer Card (Upgraded) ================= */
        .transfer-card { background: linear-gradient(135deg, rgba(30,30,30,0.9), rgba(10,10,10,0.9)); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; margin-top: 10px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); width: 220px; }
        /* 顶部一抹代表成功的绿色微光 */
        .transfer-card::before { content: none; }
        .t-icon { font-size: 20px; background: rgba(76, 217, 100, 0.15); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid rgba(76, 217, 100, 0.3); }
        .t-details { flex: 1; }
        .t-title { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
        .t-amount { font-size: 18px; font-weight: bold; color: #4cd964; margin-top: 3px; font-family: "SF Pro Display", sans-serif; }
        .transfer-header {
            display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
        }
        .transfer-icon {
            width: 38px; height: 38px;
            background: rgba(52, 199, 89, 0.15);
            color: #34c759;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold;
        }
        .transfer-title-wrap { flex: 1; }
        .transfer-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 2px;}
        .transfer-status { font-size: 11px; color: #34c759; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .transfer-amount { font-size: 34px; font-weight: 800; color: #fff; margin-bottom: 16px; letter-spacing: -0.5px;}
        .transfer-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 0 -20px 16px -20px; }
        .transfer-details { display: flex; flex-direction: column; gap: 10px; }
        .transfer-row { display: flex; justify-content: space-between; font-size: 13px; }
        .transfer-row span { color: rgba(255,255,255,0.5); }
        .transfer-row b { color: rgba(255,255,255,0.95); font-weight: 600; }
        .transfer-note {
            margin-top: 16px; padding-top: 14px;
            border-top: 1px dashed rgba(255,255,255,0.15);
            font-size: 12px; color: rgba(255,255,255,0.6);
            line-height: 1.5; font-style: italic;
        }

        /* ================= 聊天输入框 (Restored) ================= */
        .input-bar { padding: 30px 15%; background: transparent; }
        .input-box { background: rgba(30, 30, 30, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; display: flex; padding: 5px 20px; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        #user-input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 15px; }
        .send-btn { color: var(--ios-blue); font-weight: 600; cursor: pointer; font-size: 20px; transition: 0.2s; }
        
        /* ================= 滚动条全局美化 (Restored) ================= */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* ================= 商城专属横向滚动条隐藏 ================= */
        .shop-row::-webkit-scrollbar { display: none; } /* 隐藏商城卡片的丑陋横条，但不影响滑动 */

        /* ================= SHOP UI ================= */
        #shop-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #eaf6ff;
            color: #0f172a;
            z-index: 90;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #shop-overlay.active { transform: translateY(0); }
        .shop-header {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(234, 246, 255, 0.82);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(15, 23, 42, 0.08);
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .shop-back { cursor: pointer; color: var(--ios-blue); font-weight: 600; }
        .shop-body {
            padding: 18px 15%;
            overflow-y: auto;
            flex: 1;
        }
        .shop-topbar {
            display: flex;
            gap: 12px;
            align-items: stretch;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .shop-balance-card {
            flex: 1;
            min-width: 220px;
            background: rgba(255,255,255,0.75);
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 14px;
            padding: 14px 16px;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
        }
        .shop-balance-card .label { font-size: 12px; color: rgba(15, 23, 42, 0.6); text-transform: uppercase; letter-spacing: 1px; }
        .shop-balance-card .value { font-size: 32px; font-weight: 900; margin-top: 6px; }
        .shop-recent-card {
            flex: 1.2;
            min-width: 260px;
            background: rgba(255,255,255,0.75);
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 14px;
            padding: 14px 16px;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
        }
        .shop-recent-card .label { font-size: 12px; color: rgba(15, 23, 42, 0.6); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .shop-recent-list { display: flex; flex-direction: column; gap: 8px; }
        .shop-recent-item { display: flex; justify-content: space-between; gap: 10px; font-size: 13px; }
        .shop-recent-item span { color: rgba(15, 23, 42, 0.7); }
        .shop-recent-item b { color: #0f172a; font-weight: 700; }

        .shop-section { margin: 18px 0 22px 0; }
        .shop-section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
        .shop-section h3 { margin: 0; font-size: 15px; color: rgba(15, 23, 42, 0.82); }
        .shop-nav { display: flex; gap: 8px; }
        .shop-arrow {
            width: 32px; height: 32px;
            border-radius: 10px;
            border: 1px solid rgba(15, 23, 42, 0.10);
            background: rgba(255,255,255,0.70);
            color: rgba(15, 23, 42, 0.90);
            font-weight: 900;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.10);
        }
        .shop-arrow:active { transform: translateY(1px); }
        .shop-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 6px;
            scroll-snap-type: x mandatory;
        }
        .shop-card {
            flex: 0 0 230px;
            background: rgba(255,255,255,0.85);
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: 14px;
            padding: 14px 14px 12px 14px;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            min-height: 170px;
        }
        .shop-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .shop-emoji { font-size: 28px; }
        .shop-price { font-weight: 800; color: rgba(15, 23, 42, 0.85); font-size: 14px; }
        .shop-name { font-weight: 800; font-size: 15px; margin-bottom: 4px; }
        .shop-desc { font-size: 12px; color: rgba(15, 23, 42, 0.7); line-height: 1.4; flex: 1; }
        .shop-buy {
            margin-top: 10px;
            border: none;
            background: #0b3d91;
            color: white;
            border-radius: 10px;
            padding: 10px 12px;
            font-weight: 800;
            cursor: pointer;
        }
        .shop-buy:active { transform: translateY(1px); }
        .shop-buy[disabled] { opacity: 0.55; cursor: not-allowed; }

        .pay-terminal {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .pay-terminal.active { display: flex; }
        .pay-terminal-box {
            width: min(720px, 96vw);
            background: #0b0f0c;
            border: 1px solid rgba(34, 197, 94, 0.35);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.55);
            padding: 16px 16px 14px 16px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            color: #a7f3d0;
        }
        .pay-terminal-title {
            font-weight: 900;
            letter-spacing: 1px;
            color: #22c55e;
            margin-bottom: 10px;
            font-size: 12px;
            text-transform: uppercase;
        }
        .pay-terminal-body { white-space: pre-wrap; font-size: 12px; line-height: 1.5; }
        .pay-terminal-actions { display: flex; justify-content: flex-end; margin-top: 12px; }
        .pay-terminal-btn {
            background: rgba(34, 197, 94, 0.14);
            border: 1px solid rgba(34, 197, 94, 0.35);
            color: #22c55e;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 800;
            cursor: pointer;
        }

        /* ================= LOVE SPACE UI ================= */
        #love-space-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--love-pink); color: var(--love-text); z-index: 100; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        #love-space-overlay.active { transform: translateY(0); }
        .ls-header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; background: rgba(255, 240, 245, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,182,193,0.3); font-weight: 600; font-size: 18px; position: sticky; top: 0; z-index: 10; }
        .ls-close { cursor: pointer; color: var(--ios-blue); font-size: 16px; }
        .ls-content { flex: 1; overflow-y: auto; padding: 0 15%; display: flex; flex-direction: column; align-items: center; }
        .ls-feed-container { width: 100%; max-width: 600px; padding: 20px 0; }
        .ls-compose { background: white; border-radius: 16px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(255,182,193,0.2); display: flex; flex-direction: column; }
        .ls-compose textarea { border: none; outline: none; resize: none; width: 100%; font-size: 16px; font-family: inherit; margin-bottom: 10px; min-height: 60px; background: transparent; color: #333;}
        .ls-compose-actions { display: flex; justify-content: space-between; align-items: center; }
        .ls-btn { background: var(--ios-blue); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .ls-refresh-btn { background: #ff6b81; margin-bottom: 20px; width: 100%; }
        .tweet { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .tweet-header { display: flex; align-items: center; margin-bottom: 10px; }
        .t-avatar { font-size: 24px; margin-right: 10px; background: #f0f0f0; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .tweet-body { font-size: 15px; line-height: 1.5; margin-bottom: 12px; white-space: pre-wrap; color: #333;}
        .tweet-actions { display: flex; gap: 20px; color: #888; font-size: 14px; border-top: 1px solid #f0f0f0; padding-top: 10px;}
        .comments-section { margin-top: 10px; background: #fdf5f7; border-radius: 12px; padding: 10px; display: none;}
        .comments-section.open { display: block; }
        .comment { display: flex; margin-bottom: 8px; font-size: 14px; color: #333;}
        .c-avatar { font-size: 18px; margin-right: 8px; }
        .c-content { background: white; padding: 8px 12px; border-radius: 12px; flex: 1; }
        .c-input-area { display: flex; margin-top: 10px; gap: 10px; }
        .c-input-area input { flex: 1; border: 1px solid #ddd; background: white; color: #333; padding: 8px 12px; border-radius: 16px;}
        .ai-typing { font-size: 12px; color: #ff6b81; font-style: italic; display: none; margin-top: 5px; }
        
        .loading-text { font-size: 12px; color: #aaa; font-style: italic; margin-top: 10px; display: none;}
    </style>
</head>
<body>

    <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar">
        <div style="padding: 60px 20px 20px 20px;">
             <h2 style="font-size: 24px; margin-bottom: 5px;">Ghost</h2>
             <p style="color: #666; font-size: 13px;">LT. SIMON RILEY</p>
             </div>
    </div>

    <div id="main-chat">
        <div id="chat-window">
            </div>

        <div class="input-bar">
            <div class="input-box">
                <input type="text" id="user-input" placeholder="Message Ghost..." autocomplete="off">
                <div class="send-btn" onclick="handleSend()">↑</div>
            </div>
        </div>
    </div>

    <script>
        // 新增：移动端菜单切换逻辑
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('sidebar-overlay');
            sb.classList.toggle('open');
            ov.classList.toggle('active');
        }

        const MY_NAME = "Shangy";
    const MY_ID = "@bunny030ghostie";
    const GHOST_NAME = "Ghost";

    async function enforceEnglishOnly(rawText) {
        const text = String(rawText || '').trim();
        if (!text) return "";

        const hasCJK = /[\u3040-\u30ff\u3400-\u9fff]/.test(text);
        const hasRoleplay = /(\*|_|\[|\]|\(|\))/.test(text) && /(\*.+\*|_+|^\[.+\]$)/m.test(text);
        const hasParens = /[()]/.test(text) || /[\uFF08\uFF09]/.test(text);

        if (!hasCJK && !hasRoleplay && !hasParens) return postProcessGhostReply(text);

        try {
            const rewritePrompt = `Rewrite the following message into English ONLY.
Rules:
- English only. No Chinese/Japanese/Korean characters.
- No action descriptions, no roleplay formatting, no asterisks.
- Do NOT use parentheses (no "()", no "（）").
- Keep it in-character for Simon "Ghost" Riley: direct, protective, and grounded. Not flowery. 1-4 short sentences is fine.
Message to rewrite:
${text}`;
            const rewritten = await callAI(rewritePrompt, SYSTEM_PROMPT);
            const cleaned = String(rewritten || '').trim();
            if (cleaned && !/[\u3040-\u30ff\u3400-\u9fff]/.test(cleaned) && !/\*/.test(cleaned)) return postProcessGhostReply(cleaned);
        } catch(e) {}

        return postProcessGhostReply("stay with me. english only. breathe slow, love.");
    }

    function postProcessGhostReply(rawText) {
        let t = String(rawText || '').replace(/\r/g, '').trim();
        if (!t) return "look at me. breathe slow, love.";

        // Hard rule: no parentheses, ever.
        t = t.replace(/\uFF08[^\uFF09]*\uFF09/g, '');
        t = t.replace(/\([^)]*\)/g, '');
        t = t.replace(/[()\uFF08\uFF09]/g, '');

        // Single line, no extra formatting.
        t = t.split('\n').map(x => x.trim()).filter(Boolean).join(' ');
        t = t.replace(/\s{2,}/g, ' ').trim();

        // Allow a few sentences; just keep it tidy.
        const maxChars = 420;
        if (t.length > maxChars) t = t.slice(0, maxChars).replace(/\s+\S*$/, '').trim();

        // Strip trailing weird punctuation repeats.
        t = t.replace(/[.]{2,}/g, '.').replace(/[!]{2,}/g, '!').replace(/[?]{2,}/g, '?').trim();

        if (!t) return "good. stay close, love.";
        return t;
    }

    function extractTransferRequestPennies(text) {
        if (!text) return null;
        const raw = String(text);
        
        // 扩大了关键词的捕获范围，增加了“没钱了”、“爆金币”等口语化词汇
        const hasIntent = /(转账|转点钱|转我|转给我|给我转|给我钱|发我|打钱|汇款|爆金币|没钱|transfer|send me|pay me)/i.test(raw);

        let m = raw.match(/£\s*(\d{1,6})/i);
        if (!m) m = raw.match(/(\d{1,6})\s*£/i);
        if (!m) m = raw.match(/(\d{1,6})\s*(英镑|镑|gbp|pounds?)/i);
        // 如果有转账意图，且后面跟了数字
        if (!m && hasIntent) m = raw.match(/(转账|转点钱|转我|转给我|给我转|给我钱|发我|打钱|汇款|爆金币|没钱|transfer|send me|pay me)[^\d]*(\d{1,6})/i);

        // 情况1：你指定了具体金额
        if (m) {
            const amountStr = m[2] ? m[2] : m[1];
            const amount = parseInt(amountStr, 10);
            if (Number.isFinite(amount) && amount > 0) return amount * 100;
        }

        // 情况2：你只是表达了要钱的意图，但没说多少，让 Ghost 随机转 £100 - £500
        if (hasIntent) {
            return (Math.floor(Math.random() * 401) + 100) * 100; 
        }
        
        return null;
    }

    // Robust transfer detector: works with English/Chinese/Spanish and does not require a specific trigger phrase.
    function extractTransferRequestPenniesV2(text) {
        const raw = String(text || '').trim();
        if (!raw) return null;

        const intentRe = new RegExp(
            [
                '\\u8f6c\\u8d26',                 // 转账
                '\\u7ed9\\u6211',                 // 给我
                '\\u53d1\\u6211',                 // 发我
                '\\u6253\\u94b1',                 // 打钱
                '\\u6c47\\u6b3e',                 // 汇款
                'transfer',
                'send\\s*(?:me|over|it)?',
                'pay\\s*(?:me)?',
                'wire',
                'remit',
                'deposit',
                'give\\s*me',
                'spot\\s*me',
                'transfiere',
                'transferir',
                'env[ií]ame',
                'm[aá]ndame',
                'p[aá]same',
                'p[aá]game',
                'dep[oó]sita(?:me)?'
            ].join('|'),
            'i'
        );

        const hasIntent = intentRe.test(raw);

        function parseMoneyNumber(numStr) {
            let v = String(numStr || '').trim();
            if (!v) return null;
            if (v.includes(',') && v.includes('.')) v = v.replace(/,/g, '');
            else if (v.includes(',') && !v.includes('.')) v = v.replace(',', '.');
            const num = parseFloat(v);
            if (!Number.isFinite(num) || num <= 0) return null;
            return Math.round(num * 100);
        }

        // Currency symbol: treat as a transfer request even if intent words are missing.
        let m = raw.match(/[£$€]\s*(\d{1,9}(?:[.,]\d{1,2})?)/i);
        if (!m) m = raw.match(/(\d{1,9}(?:[.,]\d{1,2})?)\s*[£$€]/i);
        if (m) return parseMoneyNumber(m[1]);

        // GBP words: English + Spanish
        m = raw.match(/(\d{1,9}(?:[.,]\d{1,2})?)\s*(gbp|pounds?|quid|libras?)/i);
        if (m) return parseMoneyNumber(m[1]);

        // If there's clear intent, accept a plain number (assume GBP).
        if (hasIntent) {
            m = raw.match(/(\d{1,9}(?:[.,]\d{1,2})?)/);
            if (m) return parseMoneyNumber(m[1]);
        }

        return null;
    }

    async function callAI(prompt, systemPrompt = "You are a helpful assistant.") {
        const key = document.getElementById('api-key').value;
        if(!key) { alert("Please set API key in settings."); throw new Error("No Key"); }
        const res = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                model: "deepseek-ai/DeepSeek-V3", 
                messages: [{role:"system",content:systemPrompt}, {role:"user",content:prompt}], 
                temperature: 0.8 
            })
        });
        const data = await res.json();
        return data.choices[0].message.content.replace(/```json/g, '').replace(/```/g, '').trim();
    }

    function initJointAccount() {
        const raw = localStorage.getItem(JOINT_KEY);
        if (raw) {
            try { jointAccount = JSON.parse(raw); } catch(e) { jointAccount = null; }
        }
        if (!jointAccount || typeof jointAccount !== 'object') {
            jointAccount = { balancePennies: 425000, transactions: [] };
            saveJointAccount();
        }
        if (!Array.isArray(jointAccount.transactions)) jointAccount.transactions = [];
        if (typeof jointAccount.balancePennies !== 'number') jointAccount.balancePennies = 425000;
    }

    function saveJointAccount() {
        localStorage.setItem(JOINT_KEY, JSON.stringify(jointAccount));
    }

    function formatGBP(pennies) {
        const sign = pennies < 0 ? '-' : '';
        const abs = Math.abs(Math.round(pennies));
        const pounds = (abs / 100).toFixed(2);
        const withCommas = pounds.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        return `${sign}£ ${withCommas}`;
    }

    function addJointTransaction({ type, title, detail, amountPennies, meta }) {
        if (!jointAccount) initJointAccount();
        const tx = {
            id: `tx_${Date.now()}_${Math.floor(Math.random() * 1e6)}`,
            ts: Date.now(),
            type: type || 'manual',
            title: title || 'Transaction',
            detail: detail || '',
            amountPennies: Math.round(amountPennies || 0),
            meta: meta || {}
        };
        jointAccount.balancePennies += tx.amountPennies;
        jointAccount.transactions.push(tx);
        saveJointAccount();
        renderJointAccountPanel();
        renderShopHeader();
        return tx;
    }

    function getJointTransactions(limit = 50) {
        if (!jointAccount) initJointAccount();
        const sorted = [...jointAccount.transactions].sort((a, b) => (b.ts || 0) - (a.ts || 0));
        return sorted.slice(0, limit);
    }

            meta: { sectionId, itemId }

    // ============== 宠物系统 (Pet) ==============
    function clamp01to100(n) { return Math.max(0, Math.min(100, Math.round(n))); }

    function initPetState() {
        const raw = localStorage.getItem(PET_STATE_KEY);
        if (raw) {
            try { petState = JSON.parse(raw); } catch(e) { petState = null; }
        }
        if (!petState || typeof petState !== 'object') {
            petState = {
                hunger: 35,
                mood: 78,
                mode: 'home', // home | training | duty
                statusText: 'Standing by.',
                lastUpdateTs: Date.now()
            };
            savePetState();
        }
        if (typeof petState.hunger !== 'number') petState.hunger = 35;
        if (typeof petState.mood !== 'number') petState.mood = 78;
        if (!petState.mode) petState.mode = 'home';
        if (typeof petState.lastUpdateTs !== 'number') petState.lastUpdateTs = Date.now();

        applyPetDecay();
    }

    function savePetState() {
        localStorage.setItem(PET_STATE_KEY, JSON.stringify(petState));
    }

    function applyPetDecay() {
        if (!petState) return;
        const now = Date.now();
        const hours = Math.min(72, Math.max(0, (now - (petState.lastUpdateTs || now)) / 3600000));
        if (hours <= 0) return;

        // Gradual drift while you are away.
        petState.hunger = clamp01to100(petState.hunger + hours * 6);
        petState.mood = clamp01to100(petState.mood - hours * 4);
        petState.lastUpdateTs = now;
        savePetState();
    }

    function setPetMode(mode, statusText) {
        if (!petState) initPetState();
        petState.mode = mode;
        if (statusText) petState.statusText = statusText;
        petState.lastUpdateTs = Date.now();
        savePetState();
        renderPetUI();
    }

    function renderPetUI() {
        if (!petState) initPetState();
        applyPetDecay();

        const status = document.getElementById('riley-status');
        const hungerFill = document.getElementById('riley-hunger-fill');
        const moodFill = document.getElementById('riley-mood-fill');
        const hungerText = document.getElementById('riley-hunger-text');
        const moodText = document.getElementById('riley-mood-text');
        if (!status || !hungerFill || !moodFill || !hungerText || !moodText) return;

        const modeLabel = petState.mode === 'duty' ? 'On Duty' : (petState.mode === 'training' ? 'Training' : 'Home');
        status.innerText = `${modeLabel} · ${petState.statusText || ''}`.trim();

        hungerFill.style.width = `${clamp01to100(petState.hunger)}%`;
        hungerFill.style.background = 'linear-gradient(90deg, rgba(52,199,89,0.95), rgba(255,69,58,0.95))';
        hungerText.innerText = `${clamp01to100(petState.hunger)}/100`;

        moodFill.style.width = `${clamp01to100(petState.mood)}%`;
        moodFill.style.background = 'linear-gradient(90deg, rgba(255,107,129,0.95), rgba(0,122,255,0.95))';
        moodText.innerText = `${clamp01to100(petState.mood)}/100`;
    }

    function syncRileyFromGhostMessage(text) {
        if (!text) return;
        const t = String(text);
        const mission = /(mission|op(eration)?|deploy|tasking|going dark|exfil|执行任务|出任务|出勤|任务)/i.test(t);
        const back = /(i'?m back|back home|returned|safe now|home now|到家|回来了|任务完成)/i.test(t);

        if (mission) setPetMode('duty', 'Guarding the house. Waiting for the commander.');
        else if (back) setPetMode('home', 'Commander home. Relaxing.');
    }

    }

    function toggleRileyDuty() {
        if (!petState) initPetState();
        if (petState.mode === 'duty') setPetMode('home', 'Standing by.');
        else setPetMode('duty', 'Guarding the house. Waiting for the commander.');
    }

    async function triggerPetAI(action) {
        const box = document.getElementById('riley-thoughts');
        const loader = document.getElementById('riley-loading');
        box.innerText = "..."; loader.style.display = 'block';
        try {
            const reply = await callAI(action, PET_PROMPT);
            box.innerText = reply;
        } catch(e) { box.innerText = "Woof! (Network error)"; } finally { loader.style.display = 'none'; }
    }

    // ============== LOVE SPACE (推特空间) ==============
    function toggleLoveSpace() { document.getElementById('love-space-overlay').classList.toggle('active'); }
    function saveFeed() { localStorage.setItem('ghost_ls_feed_v4', JSON.stringify(lsFeed)); }

    function renderFeed() {
        const feedContainer = document.getElementById('ls-feed');
        feedContainer.innerHTML = '';
        [...lsFeed].reverse().forEach(post => {
            const dName = (post.author === "User" || post.author === MY_NAME) ? MY_NAME : post.author;
            const commentsHTML = post.comments.map(c => {
                const cName = (c.author === "User" || c.author === MY_NAME) ? MY_NAME : c.author;
                return `<div class="comment"><div class="c-avatar">${AVATARS[cName]||"👤"}</div><div class="c-content"><b>${cName}</b> ${c.content}</div></div>`;
            }).join('');

            feedContainer.innerHTML += `
                <div class="tweet">
                    <div class="tweet-header">
                        <div class="t-avatar">${AVATARS[dName]||"👤"}</div>
                        <div class="t-info"><b style="color:black">${dName}</b> <span>${post.handle}</span></div>
                    </div>
                    <div class="tweet-body">${post.content}</div>
                    <div class="tweet-actions">
                        <div style="cursor:pointer;" onclick="toggleLike(${post.id})">❤️ ${post.likes}</div>
                        <div style="cursor:pointer;" onclick="document.getElementById('comments-${post.id}').classList.toggle('open')">💬 ${post.comments.length}</div>
                    </div>
                    <div class="comments-section" id="comments-${post.id}">
                        <div>${commentsHTML}</div>
                        <div class="ai-typing" id="typing-${post.id}">Simon is typing...</div>
                        <div class="c-input-area">
                            <input type="text" id="c-input-${post.id}" placeholder="Reply...">
                            <button class="ls-btn" onclick="postComment(${post.id})">Reply</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function toggleLike(id) { const p = lsFeed.find(x=>x.id===id); p.likes++; saveFeed(); renderFeed(); }

    async function postMyTweet() {
        const text = document.getElementById('ls-textarea').value.trim();
        if(!text) return;
        const newPost = { id: Date.now(), author: MY_NAME, handle: MY_ID, content: text, likes: 0, comments: [] };
        lsFeed.push(newPost);
        document.getElementById('ls-textarea').value = '';
        saveFeed(); renderFeed();
        
        let sysMsg = LOVESPACE_PROMPT;
        let uMsg = `Shangy (${MY_ID}) posted: "${text}". Ghost MUST comment, and 1-2 other squad members (Soap, Price, or Gaz) MUST react. Output JSON: { "Ghost": "...", "Soap": "..." }`;
        triggerLSAI(newPost.id, sysMsg, uMsg);
    }

    async function postComment(postId) {
        const input = document.getElementById(`c-input-${postId}`);
        const text = input.value.trim();
        if(!text) return;
        const post = lsFeed.find(p => p.id === postId);
        post.comments.push({ author: MY_NAME, content: text });
        input.value = '';
        saveFeed(); renderFeed();
        document.getElementById(`comments-${postId}`).classList.add('open');
        
        let sysMsg = LOVESPACE_PROMPT;
        let uMsg = `Shangy commented: "${text}" on a post. Ghost MUST reply, and at least one other squad member should chime in. Output JSON: { "Ghost": "...", "Gaz": "..." }`;
        triggerLSAI(postId, sysMsg, uMsg);
    }

    async function triggerLSAI(postId, sysMsg, uMsg) {
        document.getElementById(`typing-${postId}`).style.display = 'block';
        try {
            const resp = await callAI(uMsg, sysMsg);
            const responses = JSON.parse(resp);
            const post = lsFeed.find(p => p.id === postId);
            for (const n of ["Ghost", "Soap", "Price", "Gaz"]) {
                if (!responses[n]) continue;
                let content = String(responses[n] || '').trim();
                if (n === "Ghost") content = postProcessGhostReply(await enforceEnglishOnly(content));
                post.comments.push({ author: n, content });
            }
            saveFeed(); renderFeed();
            document.getElementById(`comments-${postId}`).classList.add('open');
        } catch(e) {} finally { document.getElementById(`typing-${postId}`).style.display = 'none'; }
    }

    async function fetchAIPost() {
        const btn = document.querySelector('.ls-refresh-btn');
        btn.innerText = "🔄 Loading intel...";
        
        // 显式定义角色池，增加多样性
            const pool = [
                { name: "Ghost", handle: "@ghost141" },
                { name: "Price", handle: "@bravo_six" },
                { name: "Gaz", handle: "@gaz_141" },
                { name: "Soap", handle: "@soap_mactavish" }
            ];
            // Increase Ghost post frequency
            const selected = (Math.random() < 0.6) ? pool[0] : pool[1 + Math.floor(Math.random() * 3)];

        try {
            // 在指令中明确指定发帖人，防止 AI 总是选 Soap
            const resp = await callAI(
                `Generate 1 random tweet-style post from ${selected.name} (${selected.handle}). 
                Include their specific personality: ${selected.name==='Ghost' ? 'blunt/overprotective' : (selected.name==='Price' ? 'stern/fatherly' : 'chill/professional')}. 
                Output JSON: { "author": "${selected.name}", "handle": "${selected.handle}", "content": "..." }`, 
                LOVESPACE_PROMPT
            );
            
            let p = JSON.parse(resp);
            if (p.author === "Ghost") p.content = postProcessGhostReply(await enforceEnglishOnly(p.content));
            lsFeed.push({ 
                id: Date.now(), 
                author: p.author, 
                handle: p.handle, 
                content: p.content, 
                likes: Math.floor(Math.random()*50), 
                comments: [] 
            });
            saveFeed(); 
            renderFeed();
        } catch(e) {
            console.error("Post fetch failed", e);
        } finally { 
            btn.innerText = "✨ 刷新小队动态 (Load New Tweets)"; 
        }
    }

        // 针对 iOS 输入框的优化处理
        document.getElementById('user-input').addEventListener('focus', () => {
            setTimeout(() => {
                window.scrollTo(0, 0);
                document.body.scrollTop = 0;
                const win = document.getElementById('chat-window');
                win.scrollTop = win.scrollHeight;
            }, 300);
        });
    </script>
</body>
